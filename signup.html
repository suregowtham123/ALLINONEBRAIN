<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #a8e6cf, #81c784); /* Green gradient */
      margin: 0;
      padding: 0;
    }

    .form-box {
      max-width: 400px;
      margin: 100px auto;
      background: linear-gradient(to right, #ffcc80, #ffb74d); /* Orange gradient */
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .form-box img {
      width: 80px;
      height: 80px;
      margin-bottom: 10px;
    }

    h2 {
      color: #e65100;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #ffa726;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #ef6c00;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #e65100;
    }

    .error {
      color: red;
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      margin-top: 15px;
      color: #4e342e;
    }

    a {
      color: #bf360c;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <img src="/static/logo.png" alt="Logo">
    <h2>Sign Up</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Sign Up</button>
    </form>
    <p>Already registered? <a href="/login">Login</a></p>
  </div>
</body>
</html>
